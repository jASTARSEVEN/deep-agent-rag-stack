# Phase 6 Supabase / PGroonga 本機開發 Docker Compose

name: deep-agent-rag-stack

services:
  caddy:
    build:
      context: ..
      dockerfile: infra/docker/caddy/Dockerfile
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      TLS_ACME_EMAIL: ${TLS_ACME_EMAIL:-admin@example.com}
      TLS_ACME_STAGING: ${TLS_ACME_STAGING:-false}
      KEYCLOAK_EXPOSE_ADMIN: ${KEYCLOAK_EXPOSE_ADMIN:-false}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  supabase-db:
    image: supabase/postgres:15.1.1.78
    command: postgres -c listen_addresses='*' -c shared_preload_libraries=pg_stat_statements,pg_net,pg_graphql,pg_cron -c cron.database_name=postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-deep_agent_rag}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-deep_agent_rag}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "${MINIO_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.2
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: dev-file
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT: 8080
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL:-http://localhost/auth}
    volumes:
      - ./keycloak/deep-agent-dev-realm.json:/opt/keycloak/data/import/deep-agent-dev-realm.json:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 5s
      retries: 20

  api-migrate:
    build:
      context: ..
      dockerfile: infra/docker/api/Dockerfile
    environment:
      API_SERVICE_NAME: ${API_SERVICE_NAME:-deep-agent-api}
      API_VERSION: ${API_VERSION:-0.1.0}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: 8000
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@supabase-db:5432/${POSTGRES_DB:-deep_agent_rag}
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-.local-storage}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080/auth}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost/auth/realms/deep-agent-dev}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_JWKS_URL:-http://keycloak:8080/auth/realms/deep-agent-dev/protocol/openid-connect/certs}
      KEYCLOAK_GROUPS_CLAIM: ${KEYCLOAK_GROUPS_CLAIM:-groups}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-deep-agent-dev}
    depends_on:
      supabase-db:
        condition: service_healthy
    command: ["python", "-m", "app.db.migration_runner"]

  api:
    build:
      context: ..
      dockerfile: infra/docker/api/Dockerfile
    environment:
      API_SERVICE_NAME: ${API_SERVICE_NAME:-deep-agent-api}
      API_VERSION: ${API_VERSION:-0.1.0}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: 8000
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@supabase-db:5432/${POSTGRES_DB:-deep_agent_rag}
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-.local-storage}
      MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-5242880}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      RERANK_PROVIDER: ${RERANK_PROVIDER:-cohere}
      RERANK_MODEL: ${RERANK_MODEL:-rerank-v3.5}
      COHERE_API_KEY: ${COHERE_API_KEY}
      RERANK_TOP_N: ${RERANK_TOP_N:-6}
      RERANK_MAX_CHARS_PER_DOC: ${RERANK_MAX_CHARS_PER_DOC:-2000}
      ASSEMBLER_MAX_CONTEXTS: ${ASSEMBLER_MAX_CONTEXTS:-6}
      ASSEMBLER_MAX_CHARS_PER_CONTEXT: ${ASSEMBLER_MAX_CHARS_PER_CONTEXT:-2500}
      ASSEMBLER_MAX_CHILDREN_PER_PARENT: ${ASSEMBLER_MAX_CHILDREN_PER_PARENT:-3}
      CHAT_PROVIDER: ${CHAT_PROVIDER:-deepagents}
      CHAT_MODEL: ${CHAT_MODEL:-gpt-5-mini}
      CHAT_MAX_OUTPUT_TOKENS: ${CHAT_MAX_OUTPUT_TOKENS:-10000}
      CHAT_TIMEOUT_SECONDS: ${CHAT_TIMEOUT_SECONDS:-60}
      CHAT_INCLUDE_TRACE: ${CHAT_INCLUDE_TRACE:-false}
      CHAT_STREAM_CHUNK_SIZE: ${CHAT_STREAM_CHUNK_SIZE:-1}
      CHAT_STREAM_DEBUG: ${CHAT_STREAM_DEBUG:-false}
      LANGGRAPH_SERVICE_PORT: ${LANGGRAPH_SERVICE_PORT:-8000}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-deep-agent-rag-stack}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-}
      LANGSMITH_WORKSPACE_ID: ${LANGSMITH_WORKSPACE_ID:-}
      RETRIEVAL_VECTOR_TOP_K: ${RETRIEVAL_VECTOR_TOP_K:-8}
      RETRIEVAL_FTS_TOP_K: ${RETRIEVAL_FTS_TOP_K:-8}
      RETRIEVAL_MAX_CANDIDATES: ${RETRIEVAL_MAX_CANDIDATES:-12}
      RETRIEVAL_RRF_K: ${RETRIEVAL_RRF_K:-60}
      RETRIEVAL_HNSW_EF_SEARCH: ${RETRIEVAL_HNSW_EF_SEARCH:-100}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080/auth}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost/auth/realms/deep-agent-dev}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_JWKS_URL:-http://keycloak:8080/auth/realms/deep-agent-dev/protocol/openid-connect/certs}
      KEYCLOAK_GROUPS_CLAIM: ${KEYCLOAK_GROUPS_CLAIM:-groups}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-deep-agent-dev}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8000), 5).close()"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      api-migrate:
        condition: service_completed_successfully
      supabase-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: infra/docker/worker/Dockerfile
    # gpus: ${WORKER_GPUS:-all}
    environment:
      WORKER_SERVICE_NAME: ${WORKER_SERVICE_NAME:-deep-agent-worker}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@supabase-db:5432/${POSTGRES_DB:-deep_agent_rag}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_WORKER_POOL: ${CELERY_WORKER_POOL:-solo}
      CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-1}
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      CELERY_WORKER_MAX_TASKS_PER_CHILD: ${CELERY_WORKER_MAX_TASKS_PER_CHILD:-1}
      CELERY_TASK_ACKS_LATE: ${CELERY_TASK_ACKS_LATE:-true}
      CELERY_TASK_REJECT_ON_WORKER_LOST: ${CELERY_TASK_REJECT_ON_WORKER_LOST:-true}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-.local-storage}
      PDF_PARSER_PROVIDER: ${PDF_PARSER_PROVIDER:-opendataloader}
      OPENDATALOADER_USE_STRUCT_TREE: ${OPENDATALOADER_USE_STRUCT_TREE:-true}
      OPENDATALOADER_QUIET: ${OPENDATALOADER_QUIET:-true}
      LLAMAPARSE_API_KEY: ${LLAMAPARSE_API_KEY:-}
      LLAMAPARSE_DO_NOT_CACHE: ${LLAMAPARSE_DO_NOT_CACHE:-true}
      LLAMAPARSE_MERGE_CONTINUED_TABLES: ${LLAMAPARSE_MERGE_CONTINUED_TABLES:-false}
      CHUNK_MIN_PARENT_SECTION_LENGTH: ${CHUNK_MIN_PARENT_SECTION_LENGTH:-300}
      CHUNK_TARGET_CHILD_SIZE: ${CHUNK_TARGET_CHILD_SIZE:-800}
      CHUNK_CHILD_OVERLAP: ${CHUNK_CHILD_OVERLAP:-120}
      CHUNK_CONTENT_PREVIEW_LENGTH: ${CHUNK_CONTENT_PREVIEW_LENGTH:-120}
      CHUNK_TXT_PARENT_GROUP_SIZE: ${CHUNK_TXT_PARENT_GROUP_SIZE:-4}
      CHUNK_TABLE_PRESERVE_MAX_CHARS: ${CHUNK_TABLE_PRESERVE_MAX_CHARS:-4000}
      CHUNK_TABLE_MAX_ROWS_PER_CHILD: ${CHUNK_TABLE_MAX_ROWS_PER_CHILD:-20}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      api-migrate:
        condition: service_completed_successfully
      supabase-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["celery", "-A", "worker.celery_app.celery_app", "worker", "--loglevel=INFO"]

  web:
    build:
      context: ..
      dockerfile: infra/docker/web/Dockerfile
    environment:
      VITE_APP_NAME: ${VITE_APP_NAME:-Deep Agent RAG Stack}
      VITE_API_BASE_URL: ${API_PUBLIC_URL:-http://localhost/api}
      VITE_AUTH_MODE: ${VITE_AUTH_MODE:-keycloak}
      VITE_KEYCLOAK_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost/auth}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-deep-agent-dev}
      VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-deep-agent-web}
      WEB_ALLOWED_HOSTS: ${WEB_ALLOWED_HOSTS:-localhost,127.0.0.1,easypinex.duckdns.org}
      VITE_CHAT_STREAM_DEBUG: ${VITE_CHAT_STREAM_DEBUG:-false}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  caddy-data:
  caddy-config:
  supabase-db-data:
  minio-data:
