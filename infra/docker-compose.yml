services:
  postgres:
    build:
      context: ..
      dockerfile: infra/docker/postgres/Dockerfile
      args:
        PG_JIEBA_REPO_URL: ${PG_JIEBA_REPO_URL}
        PG_JIEBA_REF: ${PG_JIEBA_REF}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      [
        "postgres",
        "-c",
        "shared_preload_libraries=pg_jieba"
      ]
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    ports:
      - "${KEYCLOAK_DB_PORT}:5432"
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.2
    command: ["start-dev", "--import-realm"]
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME: http://localhost:${KEYCLOAK_PORT}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_PORT: 8080
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT}:8080"
    volumes:
      - ./keycloak/deep-agent-dev-realm.json:/opt/keycloak/data/import/deep-agent-dev-realm.json:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: infra/docker/api/Dockerfile
    environment:
      API_SERVICE_NAME: ${API_SERVICE_NAME}
      API_VERSION: ${API_VERSION}
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      STORAGE_BACKEND: ${STORAGE_BACKEND}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_BUCKET: ${MINIO_BUCKET}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH}
      MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-5242880}
      CHUNK_MIN_PARENT_SECTION_LENGTH: ${CHUNK_MIN_PARENT_SECTION_LENGTH:-300}
      CHUNK_TARGET_CHILD_SIZE: ${CHUNK_TARGET_CHILD_SIZE:-800}
      CHUNK_CHILD_OVERLAP: ${CHUNK_CHILD_OVERLAP:-120}
      CHUNK_CONTENT_PREVIEW_LENGTH: ${CHUNK_CONTENT_PREVIEW_LENGTH:-120}
      CHUNK_TXT_PARENT_GROUP_SIZE: ${CHUNK_TXT_PARENT_GROUP_SIZE:-4}
      CHUNK_TABLE_PRESERVE_MAX_CHARS: ${CHUNK_TABLE_PRESERVE_MAX_CHARS:-4000}
      CHUNK_TABLE_MAX_ROWS_PER_CHILD: ${CHUNK_TABLE_MAX_ROWS_PER_CHILD:-20}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      INGEST_INLINE_MODE: ${INGEST_INLINE_MODE:-false}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      RERANK_PROVIDER: ${RERANK_PROVIDER:-cohere}
      RERANK_MODEL: ${RERANK_MODEL:-rerank-v3.5}
      COHERE_API_KEY: ${COHERE_API_KEY}
      RERANK_TOP_N: ${RERANK_TOP_N:-6}
      RERANK_MAX_CHARS_PER_DOC: ${RERANK_MAX_CHARS_PER_DOC:-2000}
      ASSEMBLER_MAX_CONTEXTS: ${ASSEMBLER_MAX_CONTEXTS:-6}
      ASSEMBLER_MAX_CHARS_PER_CONTEXT: ${ASSEMBLER_MAX_CHARS_PER_CONTEXT:-2500}
      ASSEMBLER_MAX_CHILDREN_PER_PARENT: ${ASSEMBLER_MAX_CHILDREN_PER_PARENT:-3}
      CHAT_PROVIDER: ${CHAT_PROVIDER:-deterministic}
      CHAT_MODEL: ${CHAT_MODEL:-gpt-4.1-mini}
      CHAT_MAX_OUTPUT_TOKENS: ${CHAT_MAX_OUTPUT_TOKENS:-700}
      CHAT_TIMEOUT_SECONDS: ${CHAT_TIMEOUT_SECONDS:-30}
      CHAT_INCLUDE_TRACE: ${CHAT_INCLUDE_TRACE:-false}
      CHAT_STREAM_CHUNK_SIZE: ${CHAT_STREAM_CHUNK_SIZE:-64}
      LANGGRAPH_SERVICE_PORT: ${LANGGRAPH_SERVICE_PORT:-8000}
      TEXT_SEARCH_CONFIG: ${TEXT_SEARCH_CONFIG:-deep_agent_jieba}
      RETRIEVAL_VECTOR_TOP_K: ${RETRIEVAL_VECTOR_TOP_K:-8}
      RETRIEVAL_FTS_TOP_K: ${RETRIEVAL_FTS_TOP_K:-8}
      RETRIEVAL_MAX_CANDIDATES: ${RETRIEVAL_MAX_CANDIDATES:-12}
      RETRIEVAL_RRF_K: ${RETRIEVAL_RRF_K:-60}
      RETRIEVAL_HNSW_EF_SEARCH: ${RETRIEVAL_HNSW_EF_SEARCH:-100}
      KEYCLOAK_URL: ${KEYCLOAK_URL}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_JWKS_URL}
      KEYCLOAK_GROUPS_CLAIM: ${KEYCLOAK_GROUPS_CLAIM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "${API_PORT}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8000), 5).close()"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ..
      dockerfile: infra/docker/worker/Dockerfile
    environment:
      WORKER_SERVICE_NAME: ${WORKER_SERVICE_NAME}
      DATABASE_URL: ${DATABASE_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      STORAGE_BACKEND: ${STORAGE_BACKEND}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_BUCKET: ${MINIO_BUCKET}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH}
      CHUNK_MIN_PARENT_SECTION_LENGTH: ${CHUNK_MIN_PARENT_SECTION_LENGTH:-300}
      CHUNK_TARGET_CHILD_SIZE: ${CHUNK_TARGET_CHILD_SIZE:-800}
      CHUNK_CHILD_OVERLAP: ${CHUNK_CHILD_OVERLAP:-120}
      CHUNK_CONTENT_PREVIEW_LENGTH: ${CHUNK_CONTENT_PREVIEW_LENGTH:-120}
      CHUNK_TXT_PARENT_GROUP_SIZE: ${CHUNK_TXT_PARENT_GROUP_SIZE:-4}
      CHUNK_TABLE_PRESERVE_MAX_CHARS: ${CHUNK_TABLE_PRESERVE_MAX_CHARS:-4000}
      CHUNK_TABLE_MAX_ROWS_PER_CHILD: ${CHUNK_TABLE_MAX_ROWS_PER_CHILD:-20}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TEXT_SEARCH_CONFIG: ${TEXT_SEARCH_CONFIG:-deep_agent_jieba}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["celery", "-A", "worker.celery_app.celery_app", "worker", "--loglevel=INFO"]

  web:
    build:
      context: ..
      dockerfile: infra/docker/web/Dockerfile
    environment:
      VITE_APP_NAME: ${VITE_APP_NAME}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_AUTH_MODE: ${VITE_AUTH_MODE}
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM}
      VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  keycloak-db-data:
  minio-data:
